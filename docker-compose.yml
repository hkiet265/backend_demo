services:
  db:
    image: pgvector/pgvector:pg17
    container_name: emtu_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=emtu_local_pg_2024
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emtu_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: emtu_redis
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emtu_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emtu_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Local Postgres (pgvector) container — matches the DB dump exported
      # for deployment. Was previously pointed at a Supabase pooler; that
      # override is gone since the app now runs against the local `db`
      # service defined above.
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=emtu_local_pg_2024
      - DB_NAME=postgres
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY_1=${GEMINI_API_KEY_1}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3}
      - GEMINI_API_KEY_4=${GEMINI_API_KEY_4}
      - GEMINI_API_KEY_5=${GEMINI_API_KEY_5}
      - GEMINI_API_KEY_6=${GEMINI_API_KEY_6}
      - GEMINI_API_KEY_7=${GEMINI_API_KEY_7}
      - GEMINI_API_KEY_8=${GEMINI_API_KEY_8}
      - GEMINI_API_KEY_9=${GEMINI_API_KEY_9}
      - GEMINI_API_KEY_10=${GEMINI_API_KEY_10}
      - GROQ_API_KEY_1=${GROQ_API_KEY_1}
      - GROQ_API_KEY_2=${GROQ_API_KEY_2}
      - GROQ_API_KEY_3=${GROQ_API_KEY_3}
      - USE_GROQ_FOR_GENERATION=true
      - FALLBACK_TO_GEMINI=true
      # Was models/text-embedding-004 + gemini-1.5-flash — both retired by
      # Google (404 on generateContent/embedContent). Matched to .env's
      # working values.
      - EMBEDDING_MODEL=gemini-embedding-2
      - CHAT_MODEL=gemini-2.5-flash
      - EMBEDDING_DIMENSION=768
      - JWT_SECRET=emtu_secret_key_2024
      - JWT_EXPIRATION_DAYS=30
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - LOGFIRE_READ_TOKEN=${LOGFIRE_READ_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - emtu_network
    restart: unless-stopped

  frontend:
    build:
      context: ./chatbox-news-fe
      dockerfile: Dockerfile
    container_name: emtu_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./chatbox-news-fe/src:/app/src
      - ./chatbox-news-fe/public:/app/public
      - ./chatbox-news-fe/vite.config.js:/app/vite.config.js
      - ./chatbox-news-fe/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    networks:
      - emtu_network
    restart: unless-stopped

networks:
  emtu_network:
    driver: bridge

volumes:
  redis_data:
  pg_data:
