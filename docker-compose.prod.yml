services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: emtu_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-postgres}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emtu_network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: emtu_redis_prod
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emtu_network
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: emtu_backend_prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Local Postgres container (this compose stack), not the shared Supabase DB.
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_SSLMODE=disable
      # Set REDIS_URL in .env to point at an external managed Redis instead,
      # if you don't want the bundled redis container.
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - GEMINI_API_KEY_1=${GEMINI_API_KEY_1}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3}
      - GEMINI_API_KEY_4=${GEMINI_API_KEY_4}
      - GEMINI_API_KEY_5=${GEMINI_API_KEY_5}
      - GEMINI_API_KEY_6=${GEMINI_API_KEY_6}
      - GEMINI_API_KEY_7=${GEMINI_API_KEY_7}
      - GEMINI_API_KEY_8=${GEMINI_API_KEY_8}
      - GEMINI_API_KEY_9=${GEMINI_API_KEY_9}
      - GEMINI_API_KEY_10=${GEMINI_API_KEY_10}
      - GROQ_API_KEY_1=${GROQ_API_KEY_1}
      - GROQ_API_KEY_2=${GROQ_API_KEY_2}
      - GROQ_API_KEY_3=${GROQ_API_KEY_3}
      - USE_GROQ_FOR_GENERATION=${USE_GROQ_FOR_GENERATION}
      - FALLBACK_TO_GEMINI=${FALLBACK_TO_GEMINI}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - CHAT_MODEL=${CHAT_MODEL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_DAYS=${JWT_EXPIRATION_DAYS}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - LOGFIRE_READ_TOKEN=${LOGFIRE_READ_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - emtu_network
      - shared-web
    restart: always

  frontend:
    build:
      context: ./chatbox-news-fe
      dockerfile: Dockerfile.prod
    container_name: emtu_frontend_prod
    depends_on:
      - backend
    networks:
      - emtu_network
      - shared-web
    restart: always

networks:
  emtu_network:
    driver: bridge
  shared-web:
    external: true

volumes:
  redis_data:
  postgres_prod_data:
